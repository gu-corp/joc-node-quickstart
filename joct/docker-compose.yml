services:
  joct-node:
    image: ethereum/client-go:${GETH_VERSION:-v1.13.5}
    container_name: joct-node
    restart: unless-stopped
    stop_grace_period: 3m
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      BOOTNODES: ${BOOTNODES:-}
      HTTP_APIS: ${HTTP_APIS:-}
      WS_APIS: ${WS_APIS:-}
      SYNCMODE: ${SYNCMODE:-}
      GCMODE: ${GCMODE:-}
    ports:
      - "${HTTP_RPC_PORT:-18545}:8545"
      - "${WS_RPC_PORT:-18546}:8546"
      - "${P2P_PORT:-30304}:30303"
      - "${P2P_PORT:-30304}:30303/udp"
    volumes:
      - ./data:/data
      - ./genesis.json:/genesis.json:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "geth attach --datadir /data/testnet --exec 'eth.blockNumber' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Optional stateless explorer (block/tx browsing only, no address history).
  # Runs in the browser against the node's RPC: start with
  #   docker compose --profile explorer up -d
  explorer:
    image: alethio/ethereum-lite-explorer:latest
    # Image is amd64-only; runs under emulation on ARM hosts (fine for a static site)
    platform: linux/amd64
    container_name: joct-explorer
    profiles: [explorer]
    restart: unless-stopped
    environment:
      # Must be reachable from the user's BROWSER, not from inside the container
      APP_NODE_URL: ${EXPLORER_NODE_URL:-http://localhost:18545}
    ports:
      - "${EXPLORER_PORT:-18080}:80"
